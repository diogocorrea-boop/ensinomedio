<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geografia Zilda - EE Prof. Zilda Pinheiro da Silva</title>
    
    <!-- Fontes -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    
    <!-- Ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        /* --- CSS VARIÁVEIS E RESET --- */
        :root {
            --azul-primario: #0066CC;
            --azul-secundario: #003399;
            --azul-claro: #E6F2FF;
            --azul-medio: #4D94FF;
            --branco: #FFFFFF;
            --cinza-escuro: #333333;
            --cinza-claro: #F5F5F5;
            --destaque: #FF6600;
            --sombra: 0 4px 15px rgba(0, 102, 204, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Open Sans', sans-serif; background-color: var(--cinza-claro); color: var(--cinza-escuro); line-height: 1.6; }
        h1, h2, h3, h4 { font-family: 'Poppins', sans-serif; color: var(--azul-secundario); }

        /* --- LAYOUT --- */
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        
        /* --- CABEÇALHO --- */
        header { background: linear-gradient(135deg, var(--azul-secundario), var(--azul-primario)); color: var(--branco); padding: 1rem 0; position: sticky; top: 0; z-index: 1000; box-shadow: var(--sombra); }
        .nav-container { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.2rem; font-weight: 700; display: flex; align-items: center; gap: 10px; }
        .logo i { font-size: 1.8rem; }
        
        nav ul { display: flex; gap: 20px; list-style: none; }
        nav a { color: var(--branco); text-decoration: none; font-weight: 600; transition: 0.3s; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
        nav a:hover, nav a.active { background-color: rgba(255,255,255,0.2); }

        /* --- HERO SECTION --- */
        .hero { background: var(--azul-claro); padding: 60px 0; text-align: center; border-bottom: 4px solid var(--azul-primario); }
        .hero h1 { font-size: 2.5rem; margin-bottom: 15px; }
        .hero p { font-size: 1.2rem; color: var(--azul-secundario); max-width: 700px; margin: 0 auto 30px; }
        
        .btn { background: var(--destaque); color: var(--branco); padding: 12px 30px; border-radius: 30px; text-decoration: none; font-weight: 700; display: inline-block; transition: transform 0.2s; border: none; cursor: pointer; font-size: 1rem; }
        .btn:hover { transform: scale(1.05); background: #e55b00; }

        /* --- TURMAS SELECTOR --- */
        .turmas-selector { display: flex; justify-content: center; gap: 15px; margin: 30px 0; flex-wrap: wrap; }
        .turma-btn { background: var(--branco); color: var(--azul-primario); border: 2px solid var(--azul-primario); padding: 10px 25px; border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.3s; }
        .turma-btn.active, .turma-btn:hover { background: var(--azul-primario); color: var(--branco); }

        /* --- CONTEÚDO CARDS --- */
        .section { padding: 50px 0; display: none; animation: fadeIn 0.5s; }
        .section.active { display: block; }
        
        .grid-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: var(--branco); border-radius: 10px; padding: 25px; box-shadow: var(--sombra); transition: 0.3s; border-left: 5px solid var(--azul-primario); }
        .card:hover { transform: translateY(-5px); }
        .card h3 { margin-bottom: 10px; font-size: 1.3rem; }
        .card ul { padding-left: 20px; margin-top: 10px; }
        .card li { margin-bottom: 5px; color: #555; }

        /* --- QUIZ --- */
        .quiz-container { background: var(--branco); padding: 30px; border-radius: 15px; box-shadow: var(--sombra); max-width: 800px; margin: 0 auto; }
        .question-box { margin-bottom: 25px; border-bottom: 1px solid #eee; padding-bottom: 20px; }
        .options label { display: block; padding: 10px; background: #f9f9f9; margin-bottom: 8px; border-radius: 5px; cursor: pointer; transition: 0.2s; border: 1px solid #ddd; }
        .options label:hover { background: var(--azul-claro); border-color: var(--azul-medio); }
        .options input { margin-right: 10px; }
        
        /* --- RANKING --- */
        table { width: 100%; border-collapse: collapse; background: var(--branco); box-shadow: var(--sombra); border-radius: 10px; overflow: hidden; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background-color: var(--azul-secundario); color: var(--branco); }
        tr:hover { background-color: var(--azul-claro); }

        /* --- GAMES --- */
        .game-area { text-align: center; padding: 40px; background: var(--branco); border-radius: 15px; min-height: 300px; }
        .map-game-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; max-width: 600px; margin: 20px auto; }
        .region-btn { padding: 20px; background: var(--azul-claro); border: 2px solid var(--azul-medio); color: var(--azul-secundario); font-weight: 700; cursor: pointer; border-radius: 8px; }
        .region-btn:hover { background: var(--azul-medio); color: var(--branco); }

        /* --- FOOTER --- */
        footer { background: var(--azul-secundario); color: var(--branco); padding: 30px 0; text-align: center; margin-top: 50px; }
        .footer-links a { color: white; margin: 0 10px; text-decoration: none; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* RESPONSIVO */
        @media (max-width: 768px) {
            .nav-container { flex-direction: column; gap: 10px; }
            .hero h1 { font-size: 1.8rem; }
            .grid-cards { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <header>
        <div class="container nav-container">
            <div class="logo">
                <i class="fas fa-globe-americas"></i>
                <div>
                    <span>EE Prof. Zilda Pinheiro da Silva</span><br>
                    <small>Geografia - Mantena MG</small>
                </div>
            </div>
            <nav>
                <ul>
                    <li><a onclick="showSection('home')">Home</a></li>
                    <li><a onclick="showSection('conteudos')">Conteúdos</a></li>
                    <li><a onclick="showSection('quiz')">Quiz</a></li>
                    <li><a onclick="showSection('games')">Games</a></li>
                    <li><a onclick="showSection('ranking')">Ranking</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- HERO SECTION -->
    <section id="home" class="section active">
        <div class="hero">
            <div class="container">
                <h1>Bem-vindo ao Portal de Geografia</h1>
                <p>Aprenda, jogue e conquiste conhecimento sobre o espaço geográfico de Minas Gerais e do Mundo. Baseado no CRMG 2026.</p>
                <div class="turmas-selector">
                    <button class="turma-btn active" onclick="setYear(1)">1º Ano</button>
                    <button class="turma-btn" onclick="setYear(2)">2º Ano</button>
                    <button class="turma-btn" onclick="setYear(3)">3º Ano</button>
                </div>
                <button class="btn" onclick="showSection('conteudos')">Explorar Conteúdos
